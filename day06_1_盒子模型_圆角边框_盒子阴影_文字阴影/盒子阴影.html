<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <style>
        /*盒子阴影
            box-shadow
                h-shadow 水平阴影位置
                v-shadow
                blur 模糊距离 （影子是模糊的还是实的）
                spread 阴影的尺寸（阴影的大小）
                color 阴影yanse
                inset 将外部阴影改为内部阴影
        */
        div {
            width: 300px;
            height: 150px;
            background-color: pink;
            border-radius: 10px; /*实现圆角边框*/

        }

        /*鼠标经过添加阴影
        */
        div:hover {
            box-shadow: 10px 10px 10px -4px rgba(0, 0, 0, .3);
        }

    </style>
</head>
<body>
    <div></div>
</body>
</html>
