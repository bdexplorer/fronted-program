    <!--
        常见图片格式：
        1、jpg：高清、颜色多。适用于产品类
        2、gif：只能存储256色，适用于显示简单图形及字体，但是可以保存透明背景和动画效果
        3、png：结合gif和jpg的优点。存储形式丰富、能保持透明背景
        4、psd：ps专用格式，可以存放图层、通道等设计稿
    -->
