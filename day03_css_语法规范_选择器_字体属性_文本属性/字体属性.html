<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <style>
        h2 {
            font-family: '微软雅黑';

            font-weight: 400;
        }

        p {
            /*多个字体，如果第一个没有则使用第二个，以此类推*/
            font-family: "Microsoft YaHei", 'Times New Roman';

            font-size: 20px; /*字体大小*/

            /*
                设置字体粗细
                    bold 粗体
                    normal 正常
                    bolder 特粗体
                    lighter 细体

                    number 指定数字
                        700 => bold 提倡使用
                        400 => normal
            */
            font-weight: 700;

            /*
                italic 斜体
                normal
            */
            font-style: italic;
        }

        /*
            复合属性
                不能颠倒顺序
        */
        div {

            font: italic 700 16px/20px 'Microsoft YaHei UI';
        }

        /*通常对body指定字体*/
    </style>
</head>
<p>
<h2>北岛</h2>
<p>一切都是命运</p>
<p>一切都是烟云</p>
<p>一切都是没有结局的开始</p>
<p>一切都是稍纵即逝的追寻</p>
<p>一切欢乐都没有微笑</p>
<p>一切苦难都没有泪痕</p>
<p>一切语言都是重复</p>
<p>一切交往都是初逢</p>
<p>一切爱情都在心里</p>
<p>一切往事都在梦中</p>
<p>一切希望都带着注释</p>
<p>一切信仰都带着呻吟</p>
<p>一切爆发都有片刻的宁静</p>

<div>武动乾坤</div>
</body>
</html>
