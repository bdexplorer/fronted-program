<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <style>
        /*使用多类名，将width和height提取出来*/
        .box-size {
            width: 100px;
            height: 100px;
        }

        .red {
            background-color: red;
        }

        .green {
            background-color: green;
        }
    </style>
</head>
<body>
<div class="box-size red">
</div>
<div class="box-size green"></div>
<div class="box-size red"></div>
</body>
</html>
