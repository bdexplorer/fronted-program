<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <!--
        基础选择器：标签选择器、类选择器、id选择器和通配符选择器
        复合选择器：
    -->
    <style>
        /*标签选择器*/
        #pink {
            color: pink;
        }

        /*通配符选择器*/

        /*所有标签修改样式*/
        * {
            color: red;
        }
    </style>
</head>
<body>
<div id="pink">迈克尔杰克逊</div>
<div>hello world</div>
</body>
</html>
