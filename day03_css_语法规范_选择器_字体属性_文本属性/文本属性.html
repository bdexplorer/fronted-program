<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <style>
        div {
            color: aqua; /*文本颜色*/


            text-align: center; /*对齐方式*/

            /*
                 none
                 underline
                 overline
                 line-through 删除线
            */
            text-decoration: underline; /*文本装饰：下划线、删除线、上划线*/

            /*
             文本缩进
                 em是一个相对单位，就是当前元素1个文字的大小
            */
            text-indent: 20em;
        }

        p {
            text-indent: 20em;
            /*
                行间距：
                    上间距
                    文字高度
                    下间距
            */
            line-height: 20px;
        }

        /*取消a的下划线*/
        a {
            text-decoration: none;
        }

        /*
            FScapture.exe工具测量px
        */


    </style>
</head>
<p>
<h2>北岛</h2>
<p>一切都是命运</p>
<p>一切都是烟云</p>
<p>一切都是没有结局的开始</p>
<p>一切都是稍纵即逝的追寻</p>
<p>一切欢乐都没有微笑</p>
<p>一切苦难都没有泪痕</p>
<p>一切语言都是重复</p>
<p>一切交往都是初逢</p>
<p>一切爱情都在心里</p>
<p>一切往事都在梦中</p>
<p>一切希望都带着注释</p>
<p>一切信仰都带着呻吟</p>
<p>一切爆发都有片刻的宁静</p>

<div>武动乾坤</div>
</body>
</html>
