<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<!--基本语法-->
<table>
    <thead>
        <tr>
            <th>姓名</th>
            <th>性別</th>
            <th>年龄</th>
        </tr>
    </thead> <!--头部标签-->
    <tbody>
        <tr>
            <td>刘德华</td>
            <td>男</td>
            <td>56</td>
        </tr>
        <tr>
            <td>张学友</td>
            <td>男</td>
            <td>51</td>
        </tr>
        <tr>
            <td>郭富城</td>
            <td>男</td>
            <td>53</td>
        </tr>
        <tr>
            <td>黎明</td>
            <td>男</td>
            <td>54</td>
        </tr>
    </tbody>
</table>
<!--
    表格属性：放在table中
        align：left、center、right
        border：1或者""，默认""没有边框
        cellpadding：规定单元边沿与其内容之间的空白，默认1像素
        cellspacing：规定单元格之间的空白，默认2像素
        width：表格宽度
-->

<!--
    合并单元格：
        跨行合并：rowspan
        跨列合并：colspan
        合并代码写在目标单元格，跨行写在最上侧，跨列写在最左侧
-->
</body>
</html>
