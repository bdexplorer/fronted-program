<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
    <!--无序列表-->
    <h1>食物</h1>
    <ul> <!--ul中只能放li， li中可以放任意元素-->
        <li>榴莲</li>
        <li>臭豆腐</li>
    </ul>
    <!--有序列表-->
    <ol>
        <li>糖果</li>
        <li>饼干</li>
    </ol>
    <!--自定义列表-->
    <dl>
        <dt>关注我们</dt>
        <dd>新浪微博</dd>
        <dd>官方微信</dd>
    </dl>
</body>
</html>
