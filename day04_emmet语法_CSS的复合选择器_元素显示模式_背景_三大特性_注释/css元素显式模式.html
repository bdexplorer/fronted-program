<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <style>
        /*行内元素转块元素*/
        a {
            width: 150px;
            height: 50px;
            background-color: pink;
            display: block;
        }

        /*块元素转行内元素*/
        div {
            display: inline;
        }

        /*转行内块元素*/
        span {
            display: inline-block;
        }
    </style>
</head>
<body>
    <!--
        元素显式模式就是元素以什么方式进行显示。比如<div>占一行，一行放多个span

        块元素：<h1-6>、<p>、<div>、<ul>、<ol>、<li>，
            独占一行
            可以设置宽度、高度和外边距和内边距
            宽度默认是父级容器的100%
            是一个容器及盒子，里面可以放行内元素或者块级元素。

            文字类的元素内不能使用块级元素<p>、<h>，特别不能放<div>

        行内元素：
            一行内可以显示多个元素
            宽和高设置无效
            默认宽度为它本身内容的宽度
            行内元素只能容纳文本或其他行内元素。

            链接里面不能再放链接

        行内块元素：同时具有多个块元素和行内元素的特点。<img> <input> <td>
            和相邻行内元素（行内块）在一行上。但它们之间有空隙
            默认宽度就是它本身内容的宽度
            高度、行高、外边距和内边距可控。

        元素模式的转换：一个模式的元素需要另一种模式的特性。
            比如将行内元素转换为块元素
    -->
    <!--行内元素转换-->
    <a href="#">百度</a>
</body>
</html>
