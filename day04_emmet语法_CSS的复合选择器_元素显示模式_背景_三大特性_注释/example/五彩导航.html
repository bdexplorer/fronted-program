        }

        .bg3 {
            background-image: url("../images/bg3.png");

            background-position: center;
        }

        .bg4 {
            background-image: url("../images/bg4.png");
            background-repeat: no-repeat;
            background-position: center;
        }

    </style>
</head>
<body>
