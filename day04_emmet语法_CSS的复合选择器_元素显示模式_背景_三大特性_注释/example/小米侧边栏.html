<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <style>
        a {
            display: block;
            width: 200px;
            height: 40px;
            background-color: #55585a;

            font-size: 14px;
            color: aliceblue;
            text-decoration: none;
            text-indent: 2em;

            /*垂直居中，让文字的行高等于盒子的高度*/
            line-height: 40px;

            padding-left: 30px;
        }
        a:hover {
            background-color: #ff6700;
        }
        /*单行文件垂直居中*/
    </style>
</head>
<body>
<a href="#">手机 电话卡</a>
<a href="#">电视 盒子</a>
<a href="#">笔记本 平板</a>
<a href="#">出行 穿戴</a>
<a href="#">智能 路由器</a>
<a href="#">健康 儿童</a>
<a href="#">耳机 音响</a>
</body>
</html>
