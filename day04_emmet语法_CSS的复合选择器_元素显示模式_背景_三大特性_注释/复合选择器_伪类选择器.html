<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <style>
        /*
            复合选择器
                1. 后代选择器
                2. 子选择器
                3. 并集选择器
                4. 伪类选择器
        */
        /*
            伪类选择器
                用于向某些选择器添加特殊的效果，比如给连接添加特殊效果。
                伪类选择器使用冒号来表示(:) :first-child

            链接伪类
                a:link 选择所有未被访问的连接
                a:visited 选择所有已被访问的连接
                a:hover 选择鼠标指针位于其上的连接
                a:active 选择活动连接（鼠标按下未弹起）

                按照顺序书写：link->visited->hover->active
                给a指定样式，一定要在a里面
        */
        a:link {
            color: black;
            text-decoration: none;
        }

        a:visited {
            color: orange;
        }

        a:hover {
            color: skyblue;
        }

        a:active {
            color: green;
        }

        /*连接常用样式*/
        a {
            color: gray;
        }
        a:link {
            color: red;
        }


    </style>
</head>
<body>
<a href="#">小猪佩奇</a>
</body>
</html>
