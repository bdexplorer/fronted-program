<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <style>
        /*
            复合选择器
                1. 后代选择器
                2. 子选择器
                3. 并集选择器
                4. 伪类选择器
        */
        /*
            伪类选择器
                用于向某些选择器添加特殊的效果，比如给连接添加特殊效果。
                伪类选择器使用冒号来表示(:) :first-child

            focus伪类选择器
                光标，一般情况下<input>类表单元素才能获取，因此这个选择器也要针对表单元素来说。

        */
        /* 获得光标的元素*/
        input:focus {
            background-color: pink;
        }
    </style>
</head>
<body>
<input type="text"><input type="text"><input type="text">
</body>
</html>
