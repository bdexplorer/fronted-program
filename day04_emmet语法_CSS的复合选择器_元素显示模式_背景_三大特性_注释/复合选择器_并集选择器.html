<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <style>
        /*
            复合选择器
                1. 后代选择器
                2. 子选择器
                3. 并集选择器
                4. 伪类选择器
        */
        /*并集选择器*/
        div, p {
            color: pink;
        }

        /*竖着写*/
        div,
        p,
        .pig > li {
            color: pink;
        }


    </style>
</head>
<body>
<div>熊大</div>
<p>熊二</p>
<span>光头强</span>
<ul class="pig">
    <li>小猪佩奇</li>
    <li>猪爸爸</li>
    <li>猪妈妈</li>
</ul>
</body>
</html>
