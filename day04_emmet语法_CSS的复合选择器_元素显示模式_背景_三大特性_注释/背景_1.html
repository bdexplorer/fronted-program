<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <style>
        body {
            background-image: url("../image/bg.jpg");
            background-repeat: no-repeat;
            background-position: top center;
        }
        /**
         background-position可以混合使用
         background-position: center 20px;
         */

        /**
            backgroup-attachment
                图片是否为固定的
                scoll 滚动的 默认
                fixed 固定的
         */

        /**
            背景可以联合使用
         */

        /**
            背景颜色的半透明
         */
        div {
            width: 100px;
            height: 300px;
            background: rgba(0, 0, 0, 0.3);
        }
    </style>
</head>
<body>
<div></div>
</body>
</html>
