<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<!--
    浮动元素会脱离标准流（脱标）
        浮动的盒子不再保留原来的位置，会被其他元素占据（压住后面元素）
    浮动的元素会一行内显示并且元素顶部对齐

    浮动的元素具有行内块元素的特性。
        如果行内元素有了浮动，不需要手动转换为行内（块）元素

    一个元素浮动了，理论上其余兄弟元素也要浮动

    浮动的盒子只会影响浮动盒子后面的标准流不会影响前面的标准流。

    存在问题：
        1. 很多解决方案父盒子不方便给高度，但是子盒子不占有位置。
        2. 不给高度，后面的普通流会占父元素的位置
        （清除浮动）

    清除浮动：
        清除浮动元素造成的影响。
        清除浮动后，父级就会根据浮动的子盒子自动检测高度，父级有了高度，就不会影响下面的标准流了。

        选择器 {clear: 属性值;}
            left
            right
            both(通常选这个，同时清除左右两侧浮动的影响)

    清除浮动方法：
        1、额外标签法
            通俗易懂、书写方便
            添加许多无意义的标签，结构化较差
            新增的元素必须是块级元素
        2、父级添加overflow属性
            无法显示溢出部分
        3、父级添加:after伪元素

        4、父级添加双伪元素




-->

</body>
</html>
