<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <style>
        .box {
            width: 1200px;
            height: 460px;
            background-color: pink;
            margin: 0 auto;
        }
        .left {
            float: left;
            width: 230px;
            height: 460px;
            background-color: purple;
        }
        .right {
            float: left;
            width: 970px;
            height: 460px;
            background-color: #ff6700;
        }
    </style>
</head>
<body>
    <div class="box">
        <div class="left">
            左侧
        </div>
        <div class="right">
            右侧
        </div>
    </div>
</body>
</html>
