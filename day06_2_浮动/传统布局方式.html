<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
    <!--
        1、普通流（标准流）
            标签按照规定好默认方式排序 （块元素、行内元素、行内块元素）

            纵向排列使用标准流
        2、浮动
            横向排列使用浮动

            float 属性用于创建浮动框，将其移动到一边，直到左边缘或右边缘及包含块或另一个浮动框的边缘
            float 值
                none 不浮动
                left 向左浮动
                right 向右浮动

        3、定位

        实际开发中，一个页面基本都包含三种布局方式。（标准流、浮动和定位）

        布局第一准则：通常先用标准流的父元素排列上下位置，内部子元素使用浮动排列左右位置
        第二准则：先设置盒子的大小再设置盒子的位置

    -->
</body>
</html>
