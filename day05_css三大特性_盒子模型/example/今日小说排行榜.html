<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <style>
        table, td, th {
            border: 3px solid pink;
            /*控制浏览器绘制表格边框的方式，它控制相邻单元格的边框
                collapse：相邻的边框合并在一起
            */
            border-collapse: collapse; /**/
        }
    </style>
</head>
<body>
<table>
    <tr>
        <th>排名</th>
        <th>关键词</th>
        <th>趋势</th>
        <th>进入搜索</th>
        <th>最近七日</th>
        <th>相关链接</th>
    </tr>
    <tr>
        <td>1</td>
        <td>鬼吹灯</td>
        <td><img src="../images/up.jpg"></td>
        <td>456</td>
        <td>123</td>
        <td><a href="#">贴吧</a> &nbsp;<a href="#">图片</a></td>
    </tr>
</table>
</body>
</html>
