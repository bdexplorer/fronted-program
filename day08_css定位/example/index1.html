<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <style>
        .todou {
            position: relative;
            width: 444px;
            height: 320px;
            background-color: pink;
            margin: 30px auto;
        }

        .todou img {
            width: 100%;
            height: 100%;
        }

        .mask {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, .3) url("images/arr.png") no-repeat center;
        }
        .todou:hover .mask{
            display: block;
        }
    </style>
</head>
<body>
<div class="todou">
    <div class="mask"></div>
    <img src="images/tudou.jpg" alt="">
</div>

</body>
</html>
