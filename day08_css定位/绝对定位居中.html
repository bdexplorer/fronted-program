<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <style>
        .box {
            position: absolute; /*加了绝对定位margin:auto设置水平居中*/
            width: 100px;
            height: 100px;
            /*水平居中*/
            left: 50%;
            margin-left: -50px;
            background-color: #ff6700;

            /*垂直居中*/
            top: 50%;
            margin-top: -50px;
        }
    </style>
</head>
<body>
    <div class="box">

    </div>
</body>
</html>
