            绝对定位和固定定位：
                1、行内元素添加了绝对或者固定定位，可以直接设置高度和宽度
                2、块元素添加了绝对或者固定定位，如果不给宽度和高度，默认为内容的大小
                3、脱标的盒子不会触发塌陷

            浮动的元素只会压住它下面标准流的盒子，但是不会压住下面标准流盒子里面的文字（图片）
            绝对定位和固定定位会压住下面标准流所有内容
        */
