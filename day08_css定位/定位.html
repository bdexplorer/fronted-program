    定位可以让盒子自由地在某个盒子内移动位置或者固定屏幕中某个位置，并且可以压住盒子

    定位：将盒子定在某个位置，所以定位也是在摆放盒子，按照定位的方式移动盒子。

    定位 = 定位模式 + 边偏移

    定位模式-定位方式
        static：静态定位
        relative：相对定位
        absolute：绝对定位
        fixed：固定定位

    边偏移-最终位置
        top
        bottom
        left
        right
