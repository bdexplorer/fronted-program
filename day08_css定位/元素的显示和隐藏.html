    <style>
        /*
            1. display 显示隐藏
                none 隐藏
                block 转换块元素，并且显式元素

                不再占有原来的位置
            2. visibility 显示隐藏
                inherit 继承上一个对象的可见性
                visible
                hidden
                collapse 隐藏表格的行或者列

                继续占有原来的位置
            3. overflow 溢出显示和隐藏
                visible 不剪切也不添加滚动条
                auto 需要的时候添加滚动条，溢出才显示滚动条
                hidden
                scroll 溢出部分显示滚动条，显示滚动条
        */

    </style>
