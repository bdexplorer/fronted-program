<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
    <!--
        加粗：<strong></strong>或者<b></b>
        倾斜：<em></em>或者<i></i>
        删除线：<del></del>或者<s></s>
        下划线：<ins></ins>或者<u></u>

        建议用第一组，语义更强烈
    -->
    <strong>加粗</strong>
    <em>倾斜</em>
    <del>删除线</del>
    <ins>下划线</ins>
</body>
</html>
