<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
    <!--
        src：图片路径
        alt：替换文本，如果文件不能显示就用文本替换
        title：提示文本，鼠标放到图像上，显示文字
        width：宽度（像素）
        height：高度
        border：边框粗细

        要么修改width、要么修改height，另一个等比修改。
    -->
    <img src="../image/我们恋爱吧_速动wan.jpg"/>
    <img src="../image/我们恋爱吧_速动wa1.jpg", alt="404"/>
    <img src="../image/我们恋爱吧_速动wan.jpg", title="破纪录"/>
</body>
</html>
