<!DOCTYPE html>
<!--
    1. 文档类型声明，告诉浏览器使用的是哪种html版本， 这种表示使用的是html5
    2. 必须在文档第一行
-->
<html lang="en">
<!--
    1. 根标签
    2. lang = "en"定义语言为英语， zh-CN就是中文网页。并不限定语言。
        主要是给浏览器提示，比如谷歌浏览器提示是否翻译等功能
-->
<head> <!--文档头部-->
    <meta charset="UTF-8">
    <!--
        1. 规定HTML文档使用哪种字符编码，不写可能显式乱码
    -->
    <title>Title</title> <!--让页面拥有一个自己的网页标题-->
</head>
<body> <!--文档主体-->
Hello World！您好
</body>
</html>
